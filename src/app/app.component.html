<mat-toolbar color="primary" class="main_tool_bar">
  <button mat-icon-button  aria-label="Main Menu Icon" (click)="toggleSideNav($event)" *ngIf="!screenWide">
    <mat-icon id="main_menu_button">menu</mat-icon>
  </button>
  <span class="title">Welcome To My Portfolio</span>
  <div *ngIf="screenWide">
    <a mat-raised-button color="accent" class="title_options" routerLink="opensource">Open Source Contributions</a>
    <button mat-raised-button [matMenuTriggerFor]="menu" color="accent" class="title_options">Projects</button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item>GitHub</button>
      <button mat-menu-item>GitLab</button>
    </mat-menu>
  </div>
</mat-toolbar>

<mat-sidenav-container height=100%>
  <mat-sidenav #sidenav mode="over">
    <button mat-raised-button color="accent" class="title_options">Open Source Contributions</button> <br>
    <button mat-raised-button [matMenuTriggerFor]="menu" color="accent" class="title_options">Projects</button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item>GitHub</button>
      <button mat-menu-item>GitLab</button>
    </mat-menu>
  </mat-sidenav>

  <mat-sidenav-content>
    <router-outlet></router-outlet>
  </mat-sidenav-content>

</mat-sidenav-container>
